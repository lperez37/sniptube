services:
  api:
    build: ./api
    ports:
      - "8030:8000"
    volumes:
      - ./data:/data
      - ./ui:/app/ui
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./api
    command: arq app.worker.WorkerSettings
    volumes:
      - ./data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
